<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="24" fill="#0f2240"/>
  <rect width="120" height="120" rx="24" fill="url(#g)" opacity="0.5"/>
  <!-- Femur shaft -->
  <line x1="60" y1="18" x2="60" y2="52" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
  <!-- Tibia shaft with angular deviation -->
  <line x1="60" y1="68" x2="50" y2="102" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
  <!-- Joint line -->
  <ellipse cx="60" cy="60" rx="16" ry="4" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Mechanical axis (dashed) -->
  <line x1="60" y1="18" x2="60" y2="102" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Angle arc -->
  <path d="M60 68 Q58 78, 55 85" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Angle indicator -->
  <text x="40" y="82" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fbbf24">α</text>
  <!-- Condyle dots -->
  <circle cx="48" cy="60" r="2.5" fill="#93c5fd" opacity="0.8"/>
  <circle cx="72" cy="60" r="2.5" fill="#93c5fd" opacity="0.8"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#234e77"/>
    </linearGradient>
  </defs>
</svg>
